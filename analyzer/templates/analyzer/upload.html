<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>📄 AI Resume Analyzer Dashboard</h3>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Job Title</label>
                                <input type="text" name="job_title" class="form-control" placeholder="e.g. Python Backend Developer" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Job Description Text</label>
                                <textarea name="job_description" class="form-control" rows="5" placeholder="Paste the full job responsibilities here..." required></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Upload Resume (PDF only)</label>
                                <input type="file" name="resume" class="form-control" accept=".pdf" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">⏳ Launch AI Analysis</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
