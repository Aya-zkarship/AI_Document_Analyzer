<!DOCTYPE html>
<html>
<head>
    <title>AI Document Analyzer</title>
    <meta charset="UTF-8">
</head>
<body>
    <form action="https://api.web3forms.com/submit" method="POST">
        <!-- Hna access_key tayin mn Web3Forms (rbthom lik ghadi) -->
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">

        <!-- Hna l7ajat li baghi tjm3hom -->
        <input type="text" name="name" placeholder="Ismek" required>
        <input type="email" name="email" placeholder="Email dialk" required>
        <input type="file" name="resume" accept=".pdf,.docx" required>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
